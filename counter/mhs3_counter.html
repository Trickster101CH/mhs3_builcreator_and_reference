<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f0f11">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>MHS3 Monster Reference</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f11;
    --bg-card: #18181c;
    --bg-secondary: #222228;
    --bg-sticky: rgba(15,15,17,0.92);
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.16);
    --text: #f0f0f2;
    --text-muted: #888892;
    --text-faint: #55555f;
    --power-bg: #3a1a10; --power-fg: #ff7a4a;
    --speed-bg: #0d1f3a; --speed-fg: #4aadff;
    --tech-bg: #0d2e1a; --tech-fg: #4adf8a;
    --accent: #c8a96e;
    --accent-dim: rgba(200,169,110,0.15);
    --fire: #ff6b35; --water: #3b9dff; --thunder: #ffd93d;
    --ice: #7fdbff; --dragon: #c77dff; --raw: #cccccc;
    --poison: #b266ff; --burn: #ff6b35; --para: #ffd93d;
    --sleep: #7fdbff; --blast: #ff4d6d; --bleed: #ff3333;
    --dark: #9966cc;
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    min-height: 100dvh;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: contain;
  }

  .sticky-top {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg-sticky);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 12px 16px 0;
    border-bottom: 1px solid var(--border);
  }

  header {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 10px;
  }
  header h1 {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: .02em;
    color: var(--accent);
    white-space: nowrap;
  }
  header span {
    font-size: 11px;
    color: var(--text-faint);
  }

  .search-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }

  .search-wrap {
    flex: 1;
    min-width: 0;
    position: relative;
  }

  #search {
    width: 100%;
    padding: 10px 38px 10px 14px;
    font-size: 16px; /* prevents iOS zoom */
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    outline: none;
    transition: border-color .15s;
  }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--text-faint); }

  .search-clear {
    position: absolute;
    right: 6px;
    top: 50%;
    transform: translateY(-50%);
    width: 28px;
    height: 28px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-size: 18px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    -webkit-tap-highlight-color: transparent;
  }
  .search-clear:active { background: var(--border); }

  .fav-toggle {
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 18px;
    transition: all .15s;
    flex-shrink: 0;
    color: var(--text-faint);
  }
  .fav-toggle.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  .filters {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding-bottom: 10px;
    scroll-snap-type: x proximity;
  }
  .filters::-webkit-scrollbar { display: none; }

  .filter-btn {
    font-size: 11px;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
    flex-shrink: 0;
    min-height: 32px;
    scroll-snap-align: start;
    -webkit-tap-highlight-color: transparent;
  }
  .filter-btn:hover { border-color: var(--border-hover); color: var(--text); }
  .filter-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 600;
  }

  .content { padding: 10px 12px 40px; }

  .count {
    font-size: 11px;
    color: var(--text-faint);
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(560px, 1fr));
    gap: 10px;
  }
  @media (max-width: 640px) {
    .grid { grid-template-columns: 1fr; gap: 8px; }
    .card { overflow: hidden; }
    .monster-img { width: 90px; }
    .monster-img .sprite { width: 90px; height: 90px; background-size: 1440px 1440px; }
    .state-label { min-width: 70px; }
    .transforms { padding: 8px 10px; }
  }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    display: flex;
    gap: 14px;
    transition: border-color .15s;
    position: relative;
  }
  .card:hover { border-color: var(--border-hover); }
  .card.fav { border-color: rgba(200,169,110,0.3); }

  .fav-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 18px;
    color: var(--text-faint);
    opacity: 0.4;
    transition: all .15s;
    z-index: 2;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .fav-btn:hover, .card:hover .fav-btn { opacity: 0.8; }
  .fav-btn.active { color: var(--accent); opacity: 1; }

  .info { flex: 1; min-width: 0; }

  .name {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 10px;
    padding-right: 28px;
  }
  .name .type-label {
    font-size: 12px;
    font-weight: 400;
    color: var(--text-faint);
    display: block;
    margin-top: 2px;
  }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 5px;
  }

  .transforms {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 12px;
    padding: 10px 12px;
    background: var(--bg-secondary);
    border-radius: var(--radius-sm);
    border-left: 3px solid rgba(255,255,255,0.12);
  }

  .transform-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .state-label {
    font-size: 13px;
    color: var(--text-muted);
    min-width: 90px;
    flex-shrink: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 140px;
  }

  .atype {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 14px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 6px;
    white-space: nowrap;
  }
  .atype img { width: 24px; height: 24px; object-fit: contain; }
  .atype.power { background: var(--power-bg); color: var(--power-fg); }
  .atype.speed { background: var(--speed-bg); color: var(--speed-fg); }
  .atype.tech  { background: var(--tech-bg);  color: var(--tech-fg);  }

  .elem-tag {
    font-size: 13px;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 5px;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .elem-tag .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .weak-row {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 10px;
  }

  .ailment-row {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 2px;
  }

  .ailment-tag {
    font-size: 11px;
    padding: 2px 7px;
    border-radius: 4px;
    background: var(--bg-secondary);
    color: var(--text-faint);
    border: 1px solid var(--border);
    white-space: nowrap;
  }

  .monster-img {
    width: 120px;
    flex-shrink: 0;
    border-radius: var(--radius-sm);
    background: var(--bg-secondary);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    align-self: stretch;
  }
  .monster-img .sprite {
    width: 120px;
    height: 120px;
    background-size: 1920px 1920px;
    background-repeat: no-repeat;
  }

  .no-results {
    color: var(--text-muted);
    font-size: 13px;
    padding: 3rem 1rem;
    text-align: center;
    grid-column: 1/-1;
  }

  .habitat-label {
    font-size: 9px;
    color: var(--text-faint);
    margin-top: 4px;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
</style>
</head>

</div>

<div class="content">

</div>

  {name:'Malzeno',type:'Elder Dragon',transforms:[{s:'Normal',a:'s'},{s:'Blood Rite',a:'t'},{s:'Exposed',a:'s'}],weak:'Dragon x2, Fire x1, Ice x1',ailment:'Burn x2',elem:'Dragon'},
  {name:'Aenshin',type:'Elder Dragon',transforms:[{s:'Protection',a:'t'},{s:'Unleashed',a:'p'},{s:'Exposed',a:'p'}],weak:'Fire x2, Dragon x2 — Unleashed: Raw x2',ailment:'Poison x2, Dark x2',elem:'Dragon'},

  // ─── Small Monsters ───
  {name:'Aptonoth',type:'Small Monster',transforms:[{s:'Normal',a:'p'}],weak:'Fire x2, Water x1, Thunder x1, Ice x1',ailment:'All x2'},
  {name:'Slagtoth',type:'Small Monster',transforms:[{s:'Normal',a:'p'}],weak:'Thunder x2, Ice x1',ailment:'Poison x2, Sleep x2, Dark x2'},
  {name:'Bnahabra',type:'Small Monster',transforms:[{s:'Normal',a:'t'}],weak:'Fire x2, Water x1, Ice x1',ailment:'All except Para x2'},
  {name:'Great Thunderbug',type:'Small Monster',transforms:[{s:'Normal',a:'s'}],weak:'Water x2, Ice x1',ailment:'Poison x2, Burn x2, Blast x2, Bleed x2, Dark x2',elem:'Thunder'},
  {name:'Great Dracophage Bug',type:'Small Monster',transforms:[{s:'Normal',a:'s'}],weak:'Thunder x2, Water x1',ailment:'Poison x2, Burn x2, Blast x2, Bleed x2, Dark x2',elem:'Dragon'},
  {name:'Remobra',type:'Small Monster',transforms:[{s:'Normal',a:'t'}],weak:'Dragon x2, Water x1',ailment:'Para x2'},
  {name:'Gargwa',type:'Small Monster',transforms:[{s:'Normal',a:'s'}],weak:'Fire x2, Water x1, Thunder x1, Ice x1',ailment:'Poison x2, Burn x2, Para x2, Dark x2'},
  {name:'Barrel Felyne',type:'Small Monster',transforms:[{s:'Normal',a:'s'}],weak:'Barrel Bomb / Mega Barrel Bomb',ailment:'—'},
  {name:'Great Barrel Felyne',type:'Small Monster',transforms:[{s:'Normal',a:'s'}],weak:'Mega Barrel Bomb',ailment:'—'},
];

const TYPES = ['Bird Wyvern','Fanged Beast','Amphibian','Carapaceon','Temnoceran','Brute Wyvern','Piscine Wyvern','Leviathan','Fanged Wyvern','Flying Wyvern','Elder Dragon','Small Monster'];

// Element colors
const ELEM_COLORS = {
  fire:'#ff6b35',water:'#3b9dff',thunder:'#ffd93d',ice:'#7fdbff',dragon:'#c77dff',raw:'#aaaaaa',
  poison:'#b266ff',burn:'#ff6b35',para:'#ffd93d',sleep:'#7fdbff',blast:'#ff4d6d',bleed:'#ff3333',dark:'#9966cc',
  blastblight:'#ff4d6d',bleeding:'#ff3333',darkness:'#9966cc',paralysis:'#ffd93d'
};

function elemColor(text) {
  const t = text.toLowerCase();
  for (const [k,v] of Object.entries(ELEM_COLORS)) {
    if (t.includes(k)) return v;
  }
  return '#888';
}

// Favorites
let favorites = new Set();
try {
  const saved = localStorage.getItem('mhs3_favs');
  if (saved) favorites = new Set(JSON.parse(saved));
} catch(e) {}

function saveFavs() {
  try { localStorage.setItem('mhs3_favs', JSON.stringify([...favorites])); } catch(e) {}
}

function toggleFav(name, e) {
  e.stopPropagation();
  if (favorites.has(name)) favorites.delete(name); else favorites.add(name);
  saveFavs();
  render();
}

let activeFilter = 'All';
let showOnlyFavs = false;

const atNames = { p:'Power', s:'Speed', t:'Technical' };
const atClasses = { p:'power', s:'speed', t:'tech' };
const atKeys = { p:'power', s:'speed', t:'tech' };

function atTag(key) {
  return `<span class="atype ${atClasses[key]}"><img src="${AT[atKeys[key]]}" alt="${atNames[key]}"> ${atNames[key]}</span>`;
}

function elemTag(text) {
  const col = elemColor(text);
  const bg = col + '18';
  const border = col + '30';
  return `<span class="elem-tag" style="background:${bg};color:${col};border:1px solid ${border}"><span class="dot" style="background:${col}"></span>${text}</span>`;
}

function ailmentTag(text) {
  const col = elemColor(text);
  const hasCo = col !== '#888';
  const style = hasCo ? `border-color:${col}30;color:${col}` : '';
  return `<span class="ailment-tag" style="${style}">${text}</span>`;
}

function renderFilters() {
  document.getElementById('filters').innerHTML =
    ['All', ...TYPES].map(t =>
      `<button class="filter-btn${t === activeFilter ? ' active' : ''}" onclick="setFilter('${t}')">${t}</button>`
    ).join('');
}

function setFilter(t) { activeFilter = t; renderFilters(); render(); }

function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const filtered = MONSTERS.filter(m => {
    if (showOnlyFavs && !favorites.has(m.name)) return false;
    if (activeFilter !== 'All' && m.type !== activeFilter) return false;
    if (!q) return true;
    return m.name.toLowerCase().includes(q) || m.type.toLowerCase().includes(q) ||
      (m.weak && m.weak.toLowerCase().includes(q)) || (m.ailment && m.ailment.toLowerCase().includes(q));
  });

  // Sort: favorites first
  filtered.sort((a, b) => {
    const af = favorites.has(a.name) ? 0 : 1;
    const bf = favorites.has(b.name) ? 0 : 1;
    return af - bf;
  });

  document.getElementById('headerCount').textContent = `${filtered.length} / ${MONSTERS.length}`;
  document.getElementById('count').textContent = '';

  if (!filtered.length) {
    document.getElementById('grid').innerHTML = '<div class="no-results">No monsters found.</div>';
    return;
  }

  document.getElementById('grid').innerHTML = filtered.map(m => {
    const sp = getSpritePos(m.name);
    const isFav = favorites.has(m.name);
    const imgEl = sp ? `<div class="sprite" style="background-image:url(${SPRITE_URL});background-position:${-sp[1]*120}px ${-sp[0]*120}px"></div>` : '';

    const tRows = m.transforms.map(t =>
      `<div class="transform-row"><span class="state-label">${t.s}</span>${atTag(t.a)}</div>`
    ).join('');

    // Element weakness tags
    const weakParts = m.weak.split(', ').filter(w => w && w !== '—');
    const weakHtml = weakParts.length ? weakParts.map(w => elemTag(w)).join('') : '<span class="ailment-tag">—</span>';

    // Ailment tags
    const ailParts = m.ailment.split(', ').filter(a => a && a !== '—');
    const ailHtml = ailParts.length ? ailParts.map(a => ailmentTag(a)).join('') : '<span class="ailment-tag">—</span>';

    return `<div class="card${isFav ? ' fav' : ''}">
      <div class="info">
        <div class="name">${m.name}<span class="type-label">${m.type}${m.elem ? ' · '+m.elem : ''}</span></div>
        <div class="section-label">Attack Pattern</div>
        <div class="transforms">${tRows}</div>
        <div class="section-label">Element Weakness</div>
        <div class="weak-row">${weakHtml}</div>
        <div class="section-label">Ailment Weakness</div>
        <div class="ailment-row">${ailHtml}</div>
      </div>
      <button class="fav-btn${isFav ? ' active' : ''}" onclick="toggleFav('${m.name.replace(/'/g,"\\'")}',event)">★</button>
      <div class="monster-img">${imgEl}</div>
    </div>`;
  }).join('');
}

// Fav toggle button
document.getElementById('favToggle').addEventListener('click', function() {
  showOnlyFavs = !showOnlyFavs;
  this.classList.toggle('active', showOnlyFavs);
  render();
});

const searchInput = document.getElementById('search');
const clearBtn = document.getElementById('searchClear');
searchInput.addEventListener('input', function() {
  clearBtn.style.display = this.value ? 'flex' : 'none';
  render();
});
clearBtn.addEventListener('click', function() {
  searchInput.value = '';
  this.style.display = 'none';
  searchInput.focus();
  render();
});
renderFilters();
render();
</script>
